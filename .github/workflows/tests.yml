name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # PHP unit tests — no DB required.
  # ---------------------------------------------------------------------------
  php-unit:
    name: PHP Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none
          tools: composer

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHP unit tests
        run: vendor/bin/phpunit --testsuite=Unit

  # ---------------------------------------------------------------------------
  # JavaScript unit tests.
  # ---------------------------------------------------------------------------
  js:
    name: JS Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Run JS unit tests
        run: npm run test:js -- --ci

  # ---------------------------------------------------------------------------
  # PHP integration tests — requires a real WordPress test DB.
  # ---------------------------------------------------------------------------
  php-integration:
    name: PHP Integration Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test
          MYSQL_USER: db
          MYSQL_PASSWORD: db
          # Force mysql_native_password so PHP 8 mysqli connects without SSL.
          MYSQL_AUTHENTICATION_PLUGIN: mysql_native_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin -u root -proot ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=30s

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none
          tools: composer

      - name: Install WordPress core (for ABSPATH)
        run: |
          curl -O https://wordpress.org/latest.tar.gz
          tar -xzf latest.tar.gz
          echo "ABSPATH=$(pwd)/wordpress/" >> $GITHUB_ENV

      - name: Write wp-tests-config.php
        run: |
          # Use a group-command + echo so $ABSPATH is expanded by the shell.
          # Double-quote the heredoc delimiter so shell variables expand;
          # escape \$table_prefix so it is written as a PHP variable.
          {
            echo '<?php'
            echo "define( 'ABSPATH',     '$ABSPATH' );"
            echo "define( 'DB_NAME',     'test' );"
            echo "define( 'DB_USER',     'db' );"
            echo "define( 'DB_PASSWORD', 'db' );"
            echo "define( 'DB_HOST',     '127.0.0.1:3306' );"
            echo "define( 'DB_CHARSET',  'utf8mb4' );"
            echo "define( 'DB_COLLATE',  '' );"
            echo "\$table_prefix = 'wptests_';"
            echo "define( 'WP_TESTS_DOMAIN',  'example.com' );"
            echo "define( 'WP_TESTS_EMAIL',   'admin@example.com' );"
            echo "define( 'WP_TESTS_TITLE',   'CDW Test Site' );"
            echo "define( 'WP_DEFAULT_THEME', 'twentytwentyfive' );"
            echo "define( 'WP_PHP_BINARY',    'php' );"
            echo "define( 'WPLANG', '' );"
          } > wp-tests-config.php
          echo '--- wp-tests-config.php ---'
          cat wp-tests-config.php

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Wait for MySQL and verify connectivity
        run: |
          for i in $(seq 1 20); do
            php -r "
              \$c = @new mysqli('127.0.0.1', 'db', 'db', 'test', 3306);
              if (\$c->connect_error) { exit(1); }
              echo 'MySQL ready' . PHP_EOL;
              exit(0);
            " && break
            echo "Waiting for MySQL... attempt \$i"
            sleep 3
          done

      - name: Run PHP integration tests
        env:
          WP_PHPUNIT__TESTS_CONFIG: ${{ github.workspace }}/wp-tests-config.php
        run: vendor/bin/phpunit --config phpunit-integration.xml
