name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # PHP unit tests — no DB required.
  # ---------------------------------------------------------------------------
  php-unit:
    name: PHP Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none
          tools: composer

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHP unit tests
        run: vendor/bin/phpunit --testsuite=Unit

  # ---------------------------------------------------------------------------
  # JavaScript unit tests.
  # ---------------------------------------------------------------------------
  js:
    name: JS Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Run JS unit tests
        run: npm run test:js -- --ci

      - name: Build assets
        run: npm run build

      - name: Check build is up to date
        run: |
          if ! git diff --exit-code build/; then
            echo "ERROR: build/ files are out of date. Run 'npm run build' and commit the result."
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # PHP integration tests — requires a real WordPress + MySQL environment.
  # Run locally with DDEV:  ddev exec vendor/bin/phpunit --config phpunit-integration.xml
  # ---------------------------------------------------------------------------
